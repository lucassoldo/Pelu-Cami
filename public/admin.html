<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Glamour Peluquería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 800px;
            width: 95%;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .table-container {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-light);
            color: white;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: var(--bg-color);
        }

        .btn-secondary {
            padding: 0.8rem 1.5rem;
            background: white;
            color: var(--primary-dark);
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: var(--primary-light);
            color: white;
        }
        
        .filters {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container admin-container">
        <div class="admin-header">
            <h2>Panel de <span>Reservas</span></h2>
            <a href="index.html" class="btn-secondary">Volver al Inicio</a>
        </div>

        <div class="filters">
            <label for="filter-date">Filtrar por fecha:</label>
            <input type="date" id="filter-date">
            <button id="clear-filter" class="btn-secondary" style="padding: 0.5rem 1rem;">Ver Todos</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Cliente</th>
                    </tr>
                </thead>
                <tbody id="appointments-tbody">
                    <!-- Filas generadas por JS -->
                    <tr><td colspan="3" style="text-align: center;">Cargando reservas...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
